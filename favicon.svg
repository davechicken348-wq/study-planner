<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#iconGrad)"/>
  <g filter="url(#glow)">
    <!-- Calendar/Planner shape -->
    <rect x="20" y="18" width="60" height="52" rx="4" fill="white" opacity="0.95"/>
    <!-- Calendar header -->
    <rect x="20" y="18" width="60" height="12" rx="4" fill="#6366f1" opacity="0.9"/>
    <!-- Binding/Spine -->
    <rect x="14" y="12" width="12" height="70" rx="2" fill="#4f46e5" opacity="0.8"/>
    <!-- Checkmark/task complete -->
    <path d="M 38 44 L 44 50 L 56 38" stroke="#6366f1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Small checkmarks -->
    <path d="M 35 62 L 41 68 L 60 46" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>