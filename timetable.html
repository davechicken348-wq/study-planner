<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - Study Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/timetable.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <!-- Phosphor Icons with fallback -->
    <link rel="stylesheet" href="assets/icons/phosphor-icons.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web" onerror="this.onerror=null;this.href='assets/icons/phosphor-icons.min.css';"></script>
</head>
<body>
    <div class="app-container">
        <!-- Side Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <h1><i class="ph ph-graduation-cap"></i> StudyPlanner</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">
                    <i class="ph ph-house"></i>
                    <span>Home</span>
                </a>
                <a href="planner.html" class="nav-link">
                    <i class="ph ph-notebook"></i>
                    <span>Planner</span>
                </a>
                <a href="timetable.html" class="nav-link">
                    <i class="ph ph-calendar"></i>
                    <span>Timetable</span>
                </a>
                <a href="calendar.html" class="nav-link">
                    <i class="ph ph-calendar-blank"></i>
                    <span>Calendar</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <section class="timetable-container">
                <div class="timetable-header">
                    <h2>Weekly Timetable</h2>
                    <button class="btn-add-class" id="btnAddClass">
                        <i class="ph ph-plus"></i> Add Class
                    </button>
                </div>

                <!-- Timetable Grid -->
                <div class="timetable-wrapper">
                    <div class="timetable-grid" id="timetableGrid">
                        <!-- Time labels column -->
                        <div class="time-column">
                            <div class="time-header">Time</div>
                            <!-- Times generated by JS -->
                        </div>
                        
                        <!-- Day columns generated by JS -->
                    </div>
                </div>

                <!-- Legend -->
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--priority-high)"></div>
                        <span>High Priority</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--priority-medium)"></div>
                        <span>Medium Priority</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: var(--priority-low)"></div>
                        <span>Low Priority</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add/Edit Class Modal -->
    <div class="modal" id="classModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Class</h3>
                <button class="modal-close" id="modalClose">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <form id="classForm">
                <div class="form-group">
                    <label for="className">Subject Name</label>
                    <input type="text" id="className" placeholder="e.g., Mathematics" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="classDay">Day</label>
                        <select id="classDay" required>
                            <option value="monday">Monday</option>
                            <option value="tuesday">Tuesday</option>
                            <option value="wednesday">Wednesday</option>
                            <option value="thursday">Thursday</option>
                            <option value="friday">Friday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="classRoom">Room (optional)</label>
                        <input type="text" id="classRoom" placeholder="e.g., 101">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startTime">Start Time</label>
                        <input type="time" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime">End Time</label>
                        <input type="time" id="endTime" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="classPriority">Priority</label>
                    <select id="classPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
                    <button type="submit" class="btn-save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/nav-active.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/timetable.js"></script>
</body>
</html>
