<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Study Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <!-- Phosphor Icons -->
    <link rel="stylesheet" href="assets/icons/phosphor-icons.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web" onerror="this.onerror=null;this.href='assets/icons/phosphor-icons.min.css';"></script>
</head>
<body>
    <div class="app-container">
        <!-- Side Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <h1><i class="ph ph-graduation-cap"></i> StudyPlanner</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">
                    <i class="ph ph-house"></i>
                    <span>Home</span>
                </a>
                <a href="planner.html" class="nav-link">
                    <i class="ph ph-notebook"></i>
                    <span>Planner</span>
                </a>
                <a href="timetable.html" class="nav-link">
                    <i class="ph ph-calendar"></i>
                    <span>Timetable</span>
                </a>
                <a href="calendar.html" class="nav-link">
                    <i class="ph ph-calendar-blank"></i>
                    <span>Calendar</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="desktop-grid">
                <!-- Left Column: Hero + Today's Events -->
                <div class="left-column">
                    <section class="hero-section">
                        <div class="hero-background-slideshow">
                            <div class="hero-slide active" style="background-image: url('assets/images/Calendar_Wallpaper/Calendar1.webp')"></div>
                            <div class="hero-slide" style="background-image: url('assets/images/Calendar_Wallpaper/Calender2.webp')"></div>
                            <div class="hero-slide" style="background-image: url('assets/images/Calendar_Wallpaper/Calender3.webp')"></div>
                            <div class="hero-slide" style="background-image: url('assets/images/Calendar_Wallpaper/Calender4.webp')"></div>
                            <div class="hero-slide" style="background-image: url('assets/images/Calendar_Wallpaper/Calender5.webp')"></div>
                            <div class="hero-slide" style="background-image: url('assets/images/Calendar_Wallpaper/Calender6.webp')"></div>
                            <div class="hero-slide" style="background-image: url('assets/images/Calendar_Wallpaper/Calender7.webp')"></div>
                        </div>
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <h1 id="heroTitle">Study Calendar</h1>
                            <p id="heroMessage">Organize your academic schedule and track important dates</p>
                        </div>
                        <div class="hero-indicators"></div>
                    </section>

                    <div class="todays-events">
                        <h3><i class="ph ph-calendar"></i> Today's Events</h3>
                        <div id="todaysEventsList" class="todays-events-list">
                            <p class="no-events">No events today</p>
                        </div>
                    </div>
                </div>

                <!-- Calendar Container -->
                <section class="calendar-container">
                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button id="prevMonth" class="nav-btn" aria-label="Previous month">
                            <i class="ph ph-caret-left"></i>
                        </button>
                        <h2 id="currentMonthYear">January 2026</h2>
                        <button id="nextMonth" class="nav-btn" aria-label="Next month">
                            <i class="ph ph-caret-right"></i>
                        </button>
                    </div>
                    <div class="calendar-actions">
                        <button id="todayBtn" class="btn-secondary">Today</button>
                        <button id="addEventBtn" class="btn-primary">
                            <i class="ph ph-plus"></i> Add Event
                        </button>
                    </div>
                </div>

                <!-- Calendar Grid -->
                <div class="calendar-grid">
                    <div class="calendar-weekdays">
                        <div class="weekday">Sun</div>
                        <div class="weekday">Mon</div>
                        <div class="weekday">Tue</div>
                        <div class="weekday">Wed</div>
                        <div class="weekday">Thu</div>
                        <div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>
                    </div>
                    <div class="calendar-days" id="calendarDays"></div>
                </div>

                <!-- Quick Add Event Modal -->
                <div class="modal-overlay" id="eventModal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <div class="modal-header-text">
                                <span class="modal-eyebrow"><i class="ph ph-calendar-plus"></i> New Event</span>
                                <h3 id="modalSelectedDate">Pick a date to begin</h3>
                            </div>
                            <button class="modal-close" id="closeModal" aria-label="Close modal">
                                <i class="ph ph-x"></i>
                            </button>
                        </div>
                        <form id="eventForm">
                            <input type="hidden" id="eventDate" value="">
                            <div class="form-body">
                                <div class="form-group">
                                    <label for="eventTitle"><i class="ph ph-pencil-simple"></i> Event Title <span class="required">*</span></label>
                                    <input type="text" id="eventTitle" required maxlength="100" placeholder="e.g., Math Exam">
                                </div>
                                <div class="form-group">
                                    <label for="eventCourse"><i class="ph ph-books"></i> Course <span class="optional">optional</span></label>
                                    <input type="text" id="eventCourse" maxlength="50" placeholder="e.g., Calculus I">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="eventStart"><i class="ph ph-clock"></i> Start</label>
                                        <input type="time" id="eventStart">
                                    </div>
                                    <div class="form-group">
                                        <label for="eventEnd"><i class="ph ph-clock-countdown"></i> End</label>
                                        <input type="time" id="eventEnd">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label><i class="ph ph-tag"></i> Category</label>
                                    <div class="category-pill-group" id="categoryPills">
                                        <input type="hidden" id="eventCategory" value="exam">
                                        <button type="button" class="cat-pill cat-pill-exam active" data-value="exam">📝 Exam</button>
                                        <button type="button" class="cat-pill cat-pill-project" data-value="project">🗂 Project</button>
                                        <button type="button" class="cat-pill cat-pill-homework" data-value="homework">📚 Homework</button>
                                        <button type="button" class="cat-pill cat-pill-lab" data-value="lab">🔬 Lab</button>
                                        <button type="button" class="cat-pill cat-pill-meeting" data-value="meeting">🤝 Meeting</button>
                                        <button type="button" class="cat-pill cat-pill-other" data-value="other">✨ Other</button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="eventDescription"><i class="ph ph-note"></i> Notes <span class="optional">optional</span></label>
                                    <textarea id="eventDescription" rows="2" maxlength="500" placeholder="Add any details..."></textarea>
                                </div>
                                <div class="form-group reminder-row">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="eventReminder" checked>
                                        <span class="checkbox-custom"></span>
                                        <i class="ph ph-bell"></i> Remind me 1 hour before
                                    </label>
                                </div>
                            </div>
                            <div class="modal-actions">
                                <button type="button" class="btn-secondary" id="cancelEvent"><i class="ph ph-x"></i> Cancel</button>
                                <button type="submit" class="btn-primary"><i class="ph ph-check"></i> Save Event</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Event Details Modal -->
                <div class="modal-overlay" id="detailModal">
                    <div class="modal-content detail-modal-content">
                        <div class="modal-header">
                            <div class="detail-header-info">
                                <span class="detail-date-label">Events for</span>
                                <h3 id="detailTitle">Event Details</h3>
                            </div>
                            <button class="modal-close" id="closeDetail" aria-label="Close modal">
                                <i class="ph ph-x"></i>
                            </button>
                        </div>
                        <div class="modal-body" id="detailBody"></div>
                    </div>
                </div>
            </section>
            </div><!-- end desktop-grid -->
        </main>
    </div>

    <script src="js/nav-active.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/sw-register.js"></script>
</body>
</html>
