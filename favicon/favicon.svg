<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#gradient)"/>

  <!-- Checkmark/calendar icon combined -->
  <g filter="url(#shadow)" transform="translate(16, 14)">
    <!-- Book/planner base -->
    <rect x="2" y="6" width="22" height="26" rx="3" fill="white" opacity="0.95"/>

    <!-- Book spine line -->
    <line x1="2" y1="6" x2="2" y2="32" stroke="white" stroke-width="1.5" opacity="0.5"/>

    <!-- Checkmark -->
    <polyline
      points="6,18 10,22 18,12"
      fill="none"
      stroke="#16a34a"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Calendar dots (representing schedule) -->
    <circle cx="15" cy="28" r="1.5" fill="#16a34a"/>
    <circle cx="20" cy="28" r="1.5" fill="#16a34a"/>
    <circle cx="25" cy="28" r="1.5" fill="#16a34a"/>
  </g>

  <!-- Graduation cap element (simplified) -->
  <g filter="url(#shadow)" transform="translate(38, 24)">
    <polygon points="8,0 0,6 16,6" fill="white" opacity="0.95"/>
    <rect x="6" y="6" width="4" height="10" fill="white" opacity="0.95"/>
    <circle cx="10" cy="5" r="2" fill="#fbbf24"/>
  </g>
</svg>
